<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heapsort Visualization | Custom Array Input</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the tree visualization */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }

        /* --- Global Zoom --- */
        #app {
            transition: min-width 0.3s ease;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* --- Tree Specific Styles --- */
        #heap-container {
            position: relative;
            min-height: 550px; 
            padding-top: 20px;
            padding-bottom: 5px; 
        }

        .heap-node {
            transition: background-color 0.9s ease-in-out, transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; 
            cursor: pointer;
            user-select: none;
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 9999px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        
        .animating-node {
            z-index: 50;
            transition: none !important;
        }

        .heap-line {
            position: absolute;
            height: 2px;
            background-color: #9ca3af;
            transform-origin: 0 0;
            z-index: 5;
            transition: all 0.5s ease-in-out;
        }

        /* Highlight classes */
        .highlight-compare {
            background-color: #fcd34d !important;
            transform: scale(1.1);
            box-shadow: 0 0 10px 5px rgba(252, 211, 77, 0.8);
        }

        .highlight-swap {
            background-color: #fca5a5 !important;
            color: white;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.9);
        }

        .highlight-sorted {
            background-color: #10b981 !important;
            color: white;
            opacity: 0.7;
        }

        .highlight-root {
            background-color: #3b82f6 !important;
            color: white;
            transform: scale(1.2);
        }

        .highlight-pulse {
            animation: pulse-animation 0.2s ease-in-out 5;
            z-index: 20;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            }
            50% {
                transform: scale(1.5);
                box-shadow: 0 0 0 20px rgba(255, 215, 0, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 215, 0, 0);
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #heap-complete-message {
            position: fixed; 
            top: 15px;
            right: 15px;
            transform: none;
            z-index: 5000;
            pointer-events: none;
            max-width: 280px;
        }

        .message-content {
            transition: opacity 0.35s ease-in-out, transform 0.35s ease-in-out;
            background-color: rgba(79, 70, 229, 0.85);
            padding: 12px 16px;
            border-radius: 8px;
        }

        #message-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        #message-subtitle {
            font-size: 0.9rem;
            margin-top: 4px;
        }

        #controls-bar {
            margin-top: 5px; 
            margin-bottom: 5px;
        }
        
        /* Custom textarea styling */
        .custom-input-area {
            transition: all 0.2s ease;
        }
        .custom-input-area:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="mx-auto bg-white shadow-xl rounded-xl p-6 md:p-10">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">Heapsort Visualizer</h1>

        <!-- Custom Array Input Section (NEW) -->
        <div class="mb-6 p-4 bg-indigo-50 rounded-lg shadow-sm border border-indigo-200">
            <div class="flex flex-col md:flex-row gap-3 items-start md:items-center justify-between">
                <div class="flex-1 w-full">
                    <label for="customArrayInput" class="block text-sm font-medium text-gray-700 mb-1">Enter your own array (comma-separated numbers):</label>
                    <textarea id="customArrayInput" rows="2" class="custom-input-area w-full p-3 border border-gray-300 rounded-md font-mono text-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="Example: 42, 17, 89, 3, 56, 24, 91, 12, 35, 68">42, 17, 89, 3, 56, 24, 91, 12, 35, 68</textarea>
                </div>
                <div class="flex gap-2 self-end md:self-center">
                    <button onclick="loadCustomArray()" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-5 rounded-lg shadow-md transition duration-200 flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"></path><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"></path></svg>
                        Load My Array
                    </button>
                    <button onclick="resetToRandom()" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-5 rounded-lg shadow-md transition duration-200">
                        Random Array
                    </button>
                </div>
            </div>
            <p class="text-xs text-gray-500 mt-2">💡 Tip: Enter numbers between 1-999, separated by commas. Min 3, Max 63 elements.</p>
        </div>

        <!-- Controls (Top Section) -->
        <div class="flex flex-wrap gap-4 items-center justify-between mb-8 p-4 bg-gray-50 rounded-lg shadow-inner">
            <div class="flex items-center gap-4">
                <label for="arraySize" class="text-sm font-medium text-gray-700 whitespace-nowrap">Array Size (N):</label>
                <input type="number" id="arraySize" value="31" min="5" max="63" class="w-20 p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <button onclick="initWithSize()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline mr-1" viewBox="0 0 20 20" fill="currentColor"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4z"></path><path fill-rule="evenodd" d="M3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
                    Generate New Array
                </button>
            </div>

            <div class="flex items-center space-x-4">
                <span class="text-sm font-medium text-gray-700">Sort Order:</span>
                <button id="sortOrderToggle" onclick="toggleSortOrder()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition duration-200">
                    Ascending (Max-Heap)
                </button>
            </div>
        </div>

        <!-- Array Visualization -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-4 mt-6">Input Array (Original Unsorted Data)</h2>
        <div id="array-container" class="flex flex-wrap justify-center gap-1.5 p-4 bg-gray-100 rounded-lg shadow-md hide-scrollbar overflow-x-auto">
            <!-- Array elements will be rendered here -->
        </div>
        
        <!-- Output Array Visualization -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-4 mt-8">Sorted Output Array (<span class="text-green-600">Fixed</span> elements are shown)</h2>
        <div id="output-array-container" class="flex flex-wrap justify-center gap-1.5 p-4 bg-green-100 rounded-lg shadow-md min-h-[50px]">
            <!-- Output elements will be rendered here -->
        </div>

        <!-- Heap Tree Visualization -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-4 mt-8">Heap Structure (Tree View - Active Elements Only)</h2>
        <div id="heap-container" class="w-full overflow-x-auto pb-0">
            <!-- Tree nodes and lines will be rendered here -->
        </div>
        
        <!-- Heap Complete Message Overlay -->
        <div id="heap-complete-message" class="hidden">
            <div id="message-content" class="message-content text-white px-10 py-5 rounded-xl shadow-2xl border-4 border-white transform scale-105 opacity-0">
                <div id="message-title" class="text-4xl font-extrabold"></div>
                <div id="message-subtitle" class="text-lg font-medium mt-2"></div>
            </div>
        </div>
        
        <!-- Algorithm Controls -->
        <div id="controls-bar" class="flex flex-wrap gap-3 items-center justify-center p-4 bg-white rounded-lg border">
            <button id="resetBtn" onclick="resetState()" class="bg-red-500 text-white font-semibold py-3 px-8 rounded-full shadow-xl hover:bg-red-600 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                <span class="text-xl font-bold align-middle mr-2">↺</span>
                <span id="resetText">Reset</span>
            </button>
            <button id="prevBtn" onclick="prevStep()" disabled class="bg-gray-400 text-white font-semibold py-2 px-4 rounded-full shadow-lg hover:bg-gray-500 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
            </button>
            <button id="playBtn" onclick="playPause()" disabled class="bg-green-600 text-white font-semibold py-3 px-8 rounded-full shadow-xl hover:bg-green-700 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline mr-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                <span id="playText">Play</span>
            </button>
            <button id="nextBtn" onclick="nextStep()" disabled class="bg-gray-800 text-white font-semibold py-2 px-4 rounded-full shadow-lg hover:bg-gray-900 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
            </button>
        </div>
        
        <!-- Status and Explanation -->
        <div id="status-moved" class="text-center mb-1 mt-3 text-lg font-bold text-indigo-700 min-h-[30px]"></div>
        <div id="explanation-moved" class="text-center mb-8 text-base font-medium text-gray-600 min-h-[30px]"></div>
        
    </div>

    <script>
        const ARRAY_SIZE_DEFAULT = 31;
        let data = []; // Holds the original, unsorted input data
        let history = [];
        let currentStep = -1;
        let isPlaying = false;
        let animationTimeout = null; 
        let isAscending = true;
        let isPausedForMessage = false;
        let isPulsingForSwap = false;
        let animationInterval = null;

        let swapAnimationCount = 0;
        let messageDisplayCount = 0;

        const appContainer = document.getElementById('app'); 
        const arrayContainer = document.getElementById('array-container');
        const heapContainer = document.getElementById('heap-container');
        const outputArrayContainer = document.getElementById('output-array-container');
        const heapCompleteMessage = document.getElementById('heap-complete-message'); 
        const messageContent = document.getElementById('message-content');
        const messageTitle = document.getElementById('message-title');
        const messageSubtitle = document.getElementById('message-subtitle');
        
        const statusEl = document.getElementById('status-moved');
        const explanationEl = document.getElementById('explanation-moved');
        
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');
        const playText = document.getElementById('playText');
        const resetBtn = document.getElementById('resetBtn');
        const sortOrderToggle = document.getElementById('sortOrderToggle');
        const arraySizeInput = document.getElementById('arraySize');

        // Tree constants
        const NODE_SIZE = 38; 
        const NODE_RADIUS = NODE_SIZE / 2;
        const LEVEL_HEIGHT = 100;
        const BASE_H_UNIT = 25;
        const HORIZONTAL_MARGIN = 0; 
        const SWAP_ANIMATION_DURATION = 150;
        const PLAY_INTERVAL = 400;
        const PULSE_DURATION = 400;

        // --- Helper: Parse custom array from textarea ---
        function parseCustomArray(inputStr) {
            let numbers = inputStr.split(',').map(s => s.trim()).filter(s => s !== '');
            let parsed = [];
            for (let s of numbers) {
                let num = Number(s);
                if (isNaN(num)) return null;
                parsed.push(num);
            }
            if (parsed.length < 3 || parsed.length > 63) return null;
            return parsed;
        }

        // --- Load custom array (main entry for user input) ---
        function loadCustomArray() {
            stopAnimation();
            const rawInput = document.getElementById('customArrayInput').value;
            const parsed = parseCustomArray(rawInput);
            if (!parsed) {
                alert("Invalid input! Please enter 3-63 comma-separated numbers (e.g., 42, 17, 89, 3, 56).");
                return;
            }
            data = [...parsed];
            arraySizeInput.value = data.length;
            regenerateFromCurrentData();
        }

        function resetToRandom() {
            stopAnimation();
            const N = parseInt(arraySizeInput.value) || 31;
            if (N < 5 || N > 63) {
                arraySizeInput.value = ARRAY_SIZE_DEFAULT;
                generateRandomArray(ARRAY_SIZE_DEFAULT);
            } else {
                generateRandomArray(N);
            }
            // Also update textarea preview with random values
            document.getElementById('customArrayInput').value = data.join(', ');
            regenerateFromCurrentData();
        }

        function initWithSize() {
            stopAnimation();
            const N = parseInt(arraySizeInput.value) || ARRAY_SIZE_DEFAULT;
            if (N < 5 || N > 63) {
                alert("Size must be between 5 and 63");
                arraySizeInput.value = ARRAY_SIZE_DEFAULT;
                generateRandomArray(ARRAY_SIZE_DEFAULT);
            } else {
                generateRandomArray(N);
            }
            document.getElementById('customArrayInput').value = data.join(', ');
            regenerateFromCurrentData();
        }

        function generateRandomArray(N) {
            data = [];
            for (let i = 0; i < N; i++) {
                data.push(Math.floor(Math.random() * 90) + 10);
            }
        }

        function regenerateFromCurrentData() {
            history = [];
            currentStep = -1;
            logState('Initial Custom Array', [], 'INITIAL', data.length, [], -1, [...data]);
            (async () => {
                await heapsort([...data]); 
                currentStep = 0;
                renderState();
                playBtn.disabled = false;
                stopAnimation();
            })();
        }

        function logState(action, highlightNodes = [], phase = 'BUILD_HEAP', heapSize = data.length, sortedIndices = [], rootIndex = -1, workingData = [], status = '') {
            history.push({
                initialArray: [...data], 
                workingArray: [...workingData], 
                action,
                highlightNodes,
                phase,
                heapSize,
                sortedIndices: [...sortedIndices],
                rootIndex,
                status
            });
        }

        async function heapify(i, n, workingData, callerPhase) {
            let largestOrSmallest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;

            const isCorrectOrder = (a, b) => isAscending ? (workingData[a] > workingData[b]) : (workingData[a] < workingData[b]);
            
            const currentState = history.length > 0 ? history[history.length - 1] : { phase: callerPhase, sortedIndices: [], rootIndex: -1 };

            if (left < n && isCorrectOrder(left, largestOrSmallest)) {
                largestOrSmallest = left;
            }
            if (right < n && isCorrectOrder(right, largestOrSmallest)) {
                largestOrSmallest = right;
            }
            
            if (left < n || right < n) {
                let highlightIndices = [i];
                if (left < n) highlightIndices.push(left);
                if (right < n) highlightIndices.push(right);
                logState(`Deciding largest/smallest among parent ${workingData[i]} and children.`, highlightIndices, currentState.phase, n, currentState.sortedIndices, currentState.rootIndex, workingData);
            }

            if (largestOrSmallest !== i) {
                const parentValue = workingData[i];
                const swapValue = workingData[largestOrSmallest];
                logState(`Swapping value ${parentValue} and ${swapValue}.`, [i, largestOrSmallest], currentState.phase, n, currentState.sortedIndices, currentState.rootIndex, workingData);
                [workingData[i], workingData[largestOrSmallest]] = [workingData[largestOrSmallest], workingData[i]]; 
                logState(`Physical positions updated.`, [i, largestOrSmallest], currentState.phase, n, currentState.sortedIndices, currentState.rootIndex, workingData, 'POST_SWAP_MOVE');
                await heapify(largestOrSmallest, n, workingData, callerPhase);
            }

            if (i === 0 && callerPhase === 'SORTING' && history.length > 0) {
                const lastState = history[history.length - 1];
                if (lastState.status !== 'HEAP_MAINTENANCE_COMPLETE') {
                    logState(`Heap maintenance cycle complete.`, [i], callerPhase, n, currentState.sortedIndices, currentState.rootIndex, workingData, 'HEAP_MAINTENANCE_COMPLETE');
                }
            }
        }

        async function heapsort(workingData) {
            const n = workingData.length;
            let phase = 'BUILD_HEAP';

            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                await heapify(i, n, workingData, phase);
            }

            logState('The initial heap structure is complete.', [], 'BUILD_COMPLETE', n, [], -1, workingData, 'BUILD_COMPLETE_MESSAGE');

            phase = 'SORTING';
            let sortedIndices = [];

            for (let i = n - 1; i > 0; i--) {
                const rootValue = workingData[0];
                const lastHeapValue = workingData[i];
                logState(`Preparing to swap root (${rootValue}) with last leaf (${lastHeapValue}).`, [0, i], phase, i + 1, sortedIndices, 0, workingData, 'PRE_SWAP_PULSE');
                logState(`Extracting root (${rootValue}) and placing value ${lastHeapValue} at the root.`, [0, i], phase, i + 1, sortedIndices, 0, workingData);
                [workingData[0], workingData[i]] = [workingData[i], workingData[0]];
                logState(`Physical positions updated.`, [0, i], phase, i + 1, sortedIndices, -1, workingData, 'POST_SWAP_MOVE');
                sortedIndices.push(i);
                const extractedValue = workingData[i];
                logState(`Element ${extractedValue} fixed in sorted position. Heap size reduced to ${i}.`, [i], phase, i, sortedIndices, -1, workingData);
                await heapify(0, i, workingData, phase);
                if (i > 1) {
                    logState(`Heap maintenance complete. Ready for next extraction.`, [], phase, i, sortedIndices, -1, workingData, 'HEAP_MAINTENANCE_COMPLETE');
                }
            }
            sortedIndices.push(0);
            logState('Heapsort Complete! The array is sorted.', [], 'FINISHED', 0, sortedIndices, -1, workingData);
        }

        function getNodeCoordinates(index, totalNodes) {
            const numLevels = Math.ceil(Math.log2(totalNodes + 1));
            const level = Math.floor(Math.log2(index + 1));
            const actualBottomNodes = totalNodes - (Math.pow(2, numLevels - 1) - 1);
            let dynamicBaseUnit;
            if (actualBottomNodes <= 4) dynamicBaseUnit = 40;
            else if (actualBottomNodes <= 8) dynamicBaseUnit = 30;
            else dynamicBaseUnit = 25;
            const maxBottomNodes = Math.pow(2, numLevels - 1);
            const levelMultiplier = Math.pow(2, numLevels - 1 - level);
            const posInLevel = index - (Math.pow(2, level) - 1);
            const totalDiagramWidth = (maxBottomNodes * 2 * dynamicBaseUnit);
            const startSlot = posInLevel * levelMultiplier * 2;
            const centerSlot = startSlot + levelMultiplier; 
            const x = HORIZONTAL_MARGIN + centerSlot * dynamicBaseUnit; 
            const y = (level * LEVEL_HEIGHT) + NODE_RADIUS;
            return { x, y, totalDiagramWidth };
        }

        function createLine(p1, p2) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) * (180 / Math.PI);
            const angleRad = angle * (Math.PI / 180);
            const startX = p1.x + NODE_RADIUS * Math.cos(angleRad);
            const startY = p1.y + NODE_RADIUS * Math.sin(angleRad);
            const lineLength = Math.max(0, length - (2 * NODE_RADIUS));
            return `<div class="heap-line" style="left: ${startX}px; top: ${startY}px; width: ${lineLength}px; transform: rotate(${angle}deg);"></div>`;
        }
        
        function applyPulseAnimation(rootIndex, lastLeafIndex) {
            const rootNode = document.getElementById(`node-${rootIndex}`);
            const lastLeafNode = document.getElementById(`node-${lastLeafIndex}`);
            if (rootNode && lastLeafNode) {
                rootNode.classList.add('highlight-pulse');
                lastLeafNode.classList.add('highlight-pulse');
                setTimeout(() => {
                    rootNode.classList.remove('highlight-pulse');
                    lastLeafNode.classList.remove('highlight-pulse');
                }, PULSE_DURATION);
            }
        }
        
        function animateSwapTransition(fromIndex, toIndex) {
            const node1 = document.getElementById(`node-${fromIndex}`);
            const node2 = document.getElementById(`node-${toIndex}`);
            if (!node1 || !node2) return;
            let startTime;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(1, elapsed / SWAP_ANIMATION_DURATION);
                const easedProgress = 0.5 - Math.cos(progress * Math.PI) / 2;
                const remainingProgress = 1 - easedProgress;
                node1.style.transform = `translate(${node1._startX * remainingProgress}px, ${node1._startY * remainingProgress}px)`;
                node2.style.transform = `translate(${node2._startX * remainingProgress}px, ${node2._startY * remainingProgress}px)`;
                if (progress < 1) requestAnimationFrame(step);
                else {
                    node1.classList.remove('animating-node');
                    node2.classList.remove('animating-node');
                    node1.style.transform = '';
                    node2.style.transform = '';
                    delete node1._startX;
                    delete node1._startY;
                    delete node2._startX;
                    delete node2._startY;
                }
            }
            requestAnimationFrame(step);
        }

        function renderHeapTree(arr, state) {
            const N_original = data.length;
            const N_active = state.heapSize; 
            const numLevels = Math.ceil(Math.log2(N_original + 1));
            const maxBottomNodes = Math.pow(2, numLevels - 1);
            const maxTotalWidth = (maxBottomNodes * 2 * BASE_H_UNIT);
            let treeContentHtml = '';
            let swapHighlightIndices = state.highlightNodes;
            if (state.status === 'POST_SWAP_MOVE' && currentStep > 0) {
                swapHighlightIndices = history[currentStep - 1].highlightNodes;
            }
            for (let i = 0; i < N_active; i++) {
                const parentCoords = getNodeCoordinates(i, N_original);
                const leftChildIndex = 2 * i + 1;
                const rightChildIndex = 2 * i + 2;
                if (leftChildIndex < N_active) treeContentHtml += createLine(parentCoords, getNodeCoordinates(leftChildIndex, N_original));
                if (rightChildIndex < N_active) treeContentHtml += createLine(parentCoords, getNodeCoordinates(rightChildIndex, N_original));
            }
            for (let i = 0; i < N_active; i++) {
                const val = arr[i];
                const coords = getNodeCoordinates(i, N_original);
                let classes = 'heap-node font-mono text-sm bg-indigo-100 text-indigo-800';
                if (swapHighlightIndices.includes(i)) {
                    const isSwap = state.action.includes('Swapping') || state.action.includes('Extracting') || state.status === 'POST_SWAP_MOVE';
                    if (isSwap) classes = classes.replace('bg-indigo-100', 'bg-red-500 text-white highlight-swap');
                    else classes = classes.replace('bg-indigo-100', 'bg-yellow-400 text-gray-800 highlight-compare');
                } else if (state.rootIndex === i && state.phase === 'SORTING') {
                    classes = classes.replace('bg-indigo-100', 'bg-blue-600 text-white highlight-root');
                }
                treeContentHtml += `<div id="node-${i}" class="${classes}" data-index="${i}" style="left: ${coords.x - NODE_RADIUS}px; top: ${coords.y - NODE_RADIUS}px;"><span class="text-lg font-bold">${val}</span><span class="text-xs font-normal opacity-70">i=${i}</span></div>`;
            }
            heapContainer.style.minHeight = `${(numLevels * LEVEL_HEIGHT) + 50}px`;
            return `<div class="relative" id="tree-wrapper" style="width: ${maxTotalWidth}px; margin: 0 auto; height: 100%;">${treeContentHtml}</div>`;
        }

        function disableControlsDuringAnimation(disable) {
            prevBtn.disabled = disable;
            nextBtn.disabled = disable;
            playBtn.disabled = disable;
            resetBtn.disabled = disable;
            arraySizeInput.disabled = disable;
            sortOrderToggle.disabled = disable;
        }

        function init() { initWithSize(); }
        
        function resetState() {
            stopAnimation();
            if (history.length > 0) {
                currentStep = 0;
                renderState();
            }
        }

        function toggleSortOrder() {
            isAscending = !isAscending;
            sortOrderToggle.textContent = isAscending ? 'Ascending (Max-Heap)' : 'Descending (Min-Heap)';
            sortOrderToggle.classList.toggle('bg-blue-500', isAscending);
            sortOrderToggle.classList.toggle('bg-red-500', !isAscending);
            regenerateFromCurrentData();
        }

        function startAnimation() {
            if (animationInterval) clearInterval(animationInterval);
            playText.textContent = 'Pause';
            animationInterval = setInterval(() => {
                if (currentStep < history.length - 1) nextStep();
                else stopAnimation();
            }, 600);
        }

        function stopAnimation() {
            if (animationInterval) { clearInterval(animationInterval); animationInterval = null; }
            playText.textContent = 'Play';
        }

        function playPause() {
            if (animationInterval) stopAnimation();
            else startAnimation();
        }

        function nextStep() {
            if (currentStep >= history.length - 1) { stopAnimation(); return; }
            const nextState = history[currentStep + 1];
            const currentState = history[currentStep];
            const isCurrentStepPreSwap = (currentState.action.includes('Swapping') || currentState.action.includes('Extracting')) && currentState.status !== 'POST_SWAP_MOVE';
            const isNextStepPostSwap = nextState.status === 'POST_SWAP_MOVE';
            const isNextStepPreSwapPulse = nextState.status === 'PRE_SWAP_PULSE';
            
            if (isNextStepPreSwapPulse) {
                currentStep++;
                renderState();
                const [rootIndex, lastLeafIndex] = nextState.highlightNodes;
                applyPulseAnimation(rootIndex, lastLeafIndex);
                if (isPlaying) {
                    clearTimeout(animationTimeout);
                    setTimeout(() => {
                        if (isPlaying && currentStep < history.length - 1) {
                            currentStep++;
                            nextStep();
                            startAnimation();
                        }
                    }, PULSE_DURATION + 100);
                } else {
                    disableControlsDuringAnimation(true);
                    setTimeout(() => { disableControlsDuringAnimation(false); renderState(); }, PULSE_DURATION + 100);
                }
                return;
            }
            
            if (isCurrentStepPreSwap && isNextStepPostSwap) {
                currentStep++;
                renderState();
                const [fromIndex, toIndex] = nextState.highlightNodes;
                const N_original = data.length;
                const p1_coords = getNodeCoordinates(fromIndex, N_original);
                const p2_coords = getNodeCoordinates(toIndex, N_original);
                const node1 = document.getElementById(`node-${fromIndex}`);
                const node2 = document.getElementById(`node-${toIndex}`);
                if (node1 && node2) {
                    const oldP1_coords = getNodeCoordinates(toIndex, N_original);
                    const oldP2_coords = getNodeCoordinates(fromIndex, N_original);
                    const dx1 = oldP1_coords.x - p1_coords.x, dy1 = oldP1_coords.y - p1_coords.y;
                    const dx2 = oldP2_coords.x - p2_coords.x, dy2 = oldP2_coords.y - p2_coords.y;
                    node1.style.transform = `translate(${dx1}px, ${dy1}px)`;
                    node2.style.transform = `translate(${dx2}px, ${dy2}px)`;
                    node1._startX = dx1; node1._startY = dy1;
                    node2._startX = dx2; node2._startY = dy2;
                    node1.classList.add('animating-node');
                    node2.classList.add('animating-node');
                    requestAnimationFrame(() => animateSwapTransition(fromIndex, toIndex));
                }
                if (isPlaying) {
                    clearTimeout(animationTimeout);
                    setTimeout(() => {
                        if (isPlaying && currentStep < history.length - 1) {
                            currentStep++;
                            nextStep();
                            startAnimation();
                        }
                    }, SWAP_ANIMATION_DURATION + 100);
                } else {
                    disableControlsDuringAnimation(true);
                    setTimeout(() => { disableControlsDuringAnimation(false); renderState(); }, SWAP_ANIMATION_DURATION + 100);
                }
                return;
            }
            
            const isMajorHeapCompletion = nextState.status === 'BUILD_COMPLETE_MESSAGE' || nextState.status === 'HEAP_MAINTENANCE_COMPLETE';
            if (isMajorHeapCompletion && isPlaying) {
                isPausedForMessage = true;
                clearTimeout(animationTimeout);
                currentStep++;
                renderState();
                setTimeout(() => {
                    if (isPlaying && isPausedForMessage) {
                        isPausedForMessage = false;
                        startAnimation();
                    }
                }, 1000);
                return;
            }
            currentStep++;
            renderState();
            if (currentStep >= history.length - 1) stopAnimation();
        }

        function prevStep() {
            if (isPlaying) stopAnimation();
            if (currentStep > 0) {
                if (history[currentStep].status === 'BUILD_COMPLETE_MESSAGE' || history[currentStep].status === 'HEAP_MAINTENANCE_COMPLETE') {
                    if (currentStep > 1 && history[currentStep - 1].status === 'POST_SWAP_MOVE') currentStep -= 2;
                    else currentStep--;
                } else if (history[currentStep].status === 'POST_SWAP_MOVE') currentStep -= 2;
                else currentStep--;
                currentStep = Math.max(0, currentStep);
                renderState();
            }
        }

        function renderState() {
            if (history.length === 0 || currentStep < 0) return;
            const state = history[currentStep];
            const initialArr = history[0].workingArray;
            const workingArr = state.workingArray;
            const N = initialArr.length;
            prevBtn.disabled = currentStep === 0 || (isPlaying && !isPausedForMessage);
            nextBtn.disabled = currentStep === history.length - 1 || (isPlaying && !isPausedForMessage);
            playBtn.disabled = state.phase === 'FINISHED';
            resetBtn.disabled = isPlaying && !isPausedForMessage;
            
            const isMajorHeapCompletion = state.status === 'BUILD_COMPLETE_MESSAGE' || state.status === 'HEAP_MAINTENANCE_COMPLETE';
            if (isMajorHeapCompletion) {
                let title = '', subtitle = '';
                if (state.status === 'BUILD_COMPLETE_MESSAGE') { title = "INITIAL HEAP CONSTRUCTED!"; subtitle = "The O(N) construction phase is complete. Sorting (extraction) begins now."; }
                else if (state.status === 'HEAP_MAINTENANCE_COMPLETE') { title = "HEAP MAINTAINED!"; subtitle = "Heap property restored. Ready for next extraction."; }
                messageTitle.textContent = title; messageSubtitle.textContent = subtitle;
                heapCompleteMessage.classList.remove('hidden');
                requestAnimationFrame(() => { messageContent.classList.remove('opacity-0'); messageContent.classList.add('opacity-100', 'scale-105'); });
            } else {
                messageContent.classList.remove('opacity-100', 'scale-105');
                messageContent.classList.add('opacity-0');
                setTimeout(() => { if (messageContent.classList.contains('opacity-0')) heapCompleteMessage.classList.add('hidden'); }, 350);
            }
            
            let statusText = '', explanationHtml = '';
            let phaseDescription = isAscending ? 'Max-Heap' : 'Min-Heap';
            if (state.phase === 'INITIAL') { statusText = 'Phase 0: Initial State'; explanationHtml = `Step ${currentStep + 1} of ${history.length}. Action: ${state.action}`; }
            else if (state.phase === 'BUILD_HEAP') { statusText = `Phase 1: Building ${phaseDescription} (${state.heapSize} elements)`; explanationHtml = `Step ${currentStep + 1} of ${history.length}. Action: ${state.action}`; }
            else if (state.status === 'BUILD_COMPLETE_MESSAGE') { statusText = `Phase 1 Complete: ${phaseDescription} Built`; explanationHtml = `Step ${currentStep + 1} of ${history.length}. <b>INITIAL HEAP CONSTRUCTED!</b>`; }
            else if (state.phase === 'SORTING') { statusText = `Phase 2: Extracting Root and Sorting (Heap Size: ${state.heapSize})`; explanationHtml = `Step ${currentStep + 1} of ${history.length}. Action: ${state.action}`; }
            else if (state.status === 'HEAP_MAINTENANCE_COMPLETE') { statusText = `Phase 2: Heap Maintenance Complete`; explanationHtml = `Step ${currentStep + 1} of ${history.length}. <b>HEAP MAINTAINED!</b>`; }
            else if (state.status === 'PRE_SWAP_PULSE') { statusText = `Phase 2: Preparing to Swap Root and Last Leaf`; explanationHtml = `Step ${currentStep + 1} of ${history.length}. <b>Pulsing root and last leaf before swap...</b>`; }
            else if (state.phase === 'FINISHED') { statusText = 'Algorithm Complete! Array is Sorted.'; const NLogN = (N * Math.log2(N)).toFixed(0); explanationHtml = `The Heapsort algorithm has finished in <b>${history.length} steps</b>. Theoretical complexity O(N log N) ≈ ${NLogN}.`; }
            if (state.status === 'POST_SWAP_MOVE') { statusEl.textContent = 'Animation Step'; explanationEl.innerHTML = 'Step to complete the physical swap transition.'; }
            else { statusEl.textContent = statusText; explanationEl.innerHTML = explanationHtml; }
            
            const sortedValues = state.sortedIndices.map(i => workingArr[i]);
            const consumedSortedValues = [...sortedValues];
            arrayContainer.innerHTML = initialArr.map((val, i) => {
                let classes = 'flex flex-col items-center justify-center p-2 rounded-lg font-mono text-sm shadow-md transition-all duration-500 w-10 h-10 bg-gray-200 text-gray-800';
                const valueIndex = consumedSortedValues.indexOf(val);
                if (valueIndex !== -1) { classes = classes.replace('bg-gray-200', 'bg-green-600 text-white highlight-sorted'); consumedSortedValues.splice(valueIndex, 1); }
                return `<div class="${classes}"><span class="font-bold">${val}</span><span class="text-xs opacity-70">i=${i}</span></div>`;
            }).join('');
            
            const outputElements = [];
            for (let i = 0; i < N; i++) {
                let val = '', classes = 'flex items-center justify-center p-2 rounded-lg font-mono text-lg font-bold shadow-md w-10 h-10 bg-gray-300 text-gray-800 opacity-30';
                if (state.sortedIndices.includes(i)) { val = workingArr[i]; classes = 'flex items-center justify-center p-2 rounded-lg font-mono text-lg font-bold shadow-md w-10 h-10 bg-green-600 text-white transition-all duration-500'; }
                else val = '-';
                outputElements.push(`<div class="${classes}">${val}</div>`);
            }
            outputArrayContainer.innerHTML = outputElements.join('');
            heapContainer.innerHTML = renderHeapTree(workingArr, state);
            const numLevels = Math.ceil(Math.log2(N + 1));
            const maxBottomNodes = Math.pow(2, numLevels - 1);
            const requiredWidth = (maxBottomNodes * 2 * BASE_H_UNIT);
            appContainer.style.minWidth = `${requiredWidth + 100}px`;
        }

        window.onload = function() { init(); };
    </script>
</body>
</html>
