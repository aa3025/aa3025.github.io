                correct: [0, 2, 3],
                explanation: `EXPANDED EXPLANATIONS:

A. CORRECT - Quartic algorithms impractical for large n: \\(O(n^4)\\) algorithms become prohibitively slow for large inputs. For example, with n=1000, an O(n⁴) algorithm might require 10¹² operations, which could take hours or days even on fast computers.

B. INCORRECT - Asymptotic analysis isn\'t everything: While asymptotic complexity is crucial for understanding scalability, real-world performance depends on constant factors, memory hierarchy effects (cache behavior), implementation details, and hardware characteristics. An O(n²) algorithm with small constants may outperform an O(n log n) algorithm with large constants for practical input sizes.

C. CORRECT - O(n log n) sorting exists: Merge sort, heap sort, and quick sort (average case) all achieve O(n log n) time complexity. This complexity represents the theoretical lower bound for comparison-based sorting algorithms, making these algorithms asymptotically optimal.

D. CORRECT - Constants matter for small n: For small input sizes, the constant factors hidden by Big O notation can dominate performance. This is why simple O(n²) algorithms like insertion sort are often faster than more complex O(n log n) algorithms for very small arrays.

E. INCORRECT - Exponential algorithms have practical uses: While exponential algorithms are infeasible for large inputs, they are used in practice for small problem instances, as subroutines in more complex algorithms, or for problems where no polynomial-time solution is known but the input size is constrained by the problem domain.`
            }
        ];

        function renderSolutions() {
            const container = document.getElementById('solutions-container');
            
            container.innerHTML = allQuizData.map((q, index) => `
                <div class="p-6 border border-gray-200 rounded-lg bg-gray-50 shadow-sm">
                    <p class="text-xl font-semibold mb-4 text-gray-700">Q${index + 1}: ${q.question}</p>
                    <div class="space-y-3 mb-6">
                        ${q.options.map((option, optIndex) => {
                            const isCorrect = q.correct.includes(optIndex);
                            const className = isCorrect ? 'solution-correct' : 'solution-incorrect';
                            return `
                                <div class="${className} p-3 rounded-lg">
                                    <div class="flex items-center">
                                        <span class="font-bold mr-2">${String.fromCharCode(65 + optIndex)}.</span>
                                        <span class="text-base text-gray-800">${option}</span>
                                        ${isCorrect ? 
                                            '<span class="ml-2 px-2 py-1 bg-green-100 text-green-800 text-xs font-medium rounded">Correct</span>' : 
                                            '<span class="ml-2 px-2 py-1 bg-red-100 text-red-800 text-xs font-medium rounded">Incorrect</span>'
                                        }
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="explanation-box p-4 rounded-lg bg-blue-50 border border-blue-200 text-sm text-gray-700 whitespace-pre-line">
                        <p class="font-bold text-blue-800 mb-2">Detailed Explanation:</p>
                        ${q.explanation}
                    </div>
                </div>
            `).join('');

            // Process MathJax after rendering
            if (window.MathJax) {
                MathJax.typesetPromise([container]).catch(err => console.error("MathJax typesetting failed: ", err));
            }
        }

        // Initialize the solutions when the page loads
        window.onload = renderSolutions;
    </script>
</body>
</html>
