<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFS Graph Traversal Visualisation</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the visualization */
        body {
            font-family: 'Inter', sans-serif;
        }
        .node {
            transition: all 0.3s ease-in-out;
        }
        .node-circle {
            stroke-width: 2;
            stroke: #374151; /* gray-700 */
            fill: #FFFFFF;
        }
        .node-text {
            font-size: 16px;
            font-weight: 600;
            fill: #1F2937; /* gray-800 */
            pointer-events: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .edge {
            stroke: #6B7280; /* gray-500 */
            stroke-width: 2;
            transition: all 0.3s ease-in-out;
            /* Reference the marker */
            marker-end: url(#arrowhead);
        }
        
        /* Node states */
        .node-inStack .node-circle { /* Changed from node-queued */
            fill: #FDE047; /* yellow-300 */
            stroke: #FACC15; /* yellow-400 */
        }
        .node-visited .node-circle {
            fill: #86EFAC; /* green-300 */
            stroke: #22C55E; /* green-500 */
        }

        /* Animation for stack items */
        .stack-item { /* Changed from queue-item */
            display: inline-block;
            padding: 8px 12px;
            margin: 4px;
            border-radius: 9999px;
            background-color: #FDE047;
            font-weight: 600;
            color: #4B5563;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-4xl bg-white rounded-lg p-6">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-4">
            DFS Algorithm - Graph Traversal Visualization
        </h1>
        
        <!-- Main container - Vertical layout -->
        <div class="flex flex-col gap-6">
            
            <!-- Visualization Area -->
            <div class="flex-grow border-2 border-gray-200 rounded-lg overflow-hidden">
                <svg id="dfs-svg" class="w-full h-[450px] lg:h-[500px]">
                    <!-- Arrowhead definition -->
                    <defs>
                        <marker
                            id="arrowhead"
                            viewBox="0 0 10 10"
                            refX="10"
                            refY="5"
                            markerWidth="6"
                            markerHeight="6"
                            orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" />
                        </marker>
                    </defs>
                </svg>
            </div>
            
            <!-- Controls and Info Panel -->
            <div class="w-full flex-shrink-0 space-y-4">
                
                <!-- Control Buttons -->
                <div>
                    <h2 class="text-xl font-semibold text-gray-700 mb-2">Controls</h2>
                    <div class="flex space-x-2">
                        <button id="prev-btn" class="w-full bg-white text-gray-700 border border-gray-300 font-semibold py-2 px-4 rounded-lg hover:bg-gray-50 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            Previous
                        </button>
                        <button id="next-btn" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            Next
                        </button>
                        <button id="reset-btn" class="w-1/2 bg-white text-red-700 border border-red-400 font-semibold py-2 px-4 rounded-lg hover:bg-red-50 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            Reset
                        </button>
                    </div>
                </div>

                <!-- Step Description -->
                <div>
                    <h2 class="text-xl font-semibold text-gray-700 mb-1">Step Description</h2>
                    <div class="min-h-[50px] bg-white border border-gray-300 rounded-lg p-3">
                        <p id="step-description" class="text-lg text-gray-800">Algorithm ready. Click 'Next' to start.</p>
                    </div>
                </div>

                <!-- Info Panels (Stack, Visited, Legend) in a grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Stack Visualization -->
                    <div>
                        <h2 class="text-xl font-semibold text-gray-700 mb-1">Stack</h2>
                        <div id="stack-container" class="min-h-[50px] bg-white border border-gray-300 rounded-lg p-2 flex flex-wrap items-center">
                            <span id="stack-placeholder" class="text-gray-400 italic">Stack is empty...</span>
                        </div>
                    </div>
                    
                    <!-- Visited Order -->
                    <div>
                        <h2 class="text-xl font-semibold text-gray-700 mb-1">Visited Order</h2>
                        <div id="visited-container" class="min-h-[50px] bg-white border border-gray-300 rounded-lg p-3">
                            <span id="visited-placeholder" class="text-gray-400 italic">No nodes visited...</span>
                            <p id="visited-output" class="text-lg font-mono text-gray-800 break-words"></p>
                        </div>
                    </div>
                    
                    <!-- Legend -->
                    <div>
                        <h2 class="text-xl font-semibold text-gray-700 mb-2">Legend</h2>
                        <div class="space-y-2">
                            <div class="flex items-center">
                                <div class="w-6 h-6 rounded-full border-2 border-gray-700 bg-white mr-2"></div>
                                <span>Unvisited</span>
                            </div>
                            <div class="flex items-center">
                                <div class="w-6 h-6 rounded-full border-2 border-yellow-400 bg-yellow-300 mr-2"></div>
                                <span>In Stack</span>
                            </div>
                            <div class="flex items-center">
                                <div class="w-6 h-6 rounded-full border-2 border-green-500 bg-green-300 mr-2"></div>
                                <span>Visited</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- DOM Elements ---
            const svg = document.getElementById('dfs-svg');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const resetBtn = document.getElementById('reset-btn');
            const stackContainer = document.getElementById('stack-container');
            const stackPlaceholder = document.getElementById('stack-placeholder');
            const visitedContainer = document.getElementById('visited-container');
            const visitedPlaceholder = document.getElementById('visited-placeholder');
            const visitedOutput = document.getElementById('visited-output');
            const stepDescription = document.getElementById('step-description');

            const svgNS = "http://www.w3.org/2000/svg";
            const nodeRadius = 20;
            const arrowOffset = nodeRadius + 2; // Offset for arrowhead to end at circle edge

            // --- Graph Data Structure (from TikZ) ---
            // 1. Node positions based on TikZ layout
            const graphNodes = {
                'A': { x: 30, y: 50 },
                'B': { x: 30, y: 25 },
                'C': { x: 50, y: 50 },
                'D': { x: 70, y: 50 },
                'E': { x: 70, y: 25 },
                'F': { x: 70, y: 75 },
                'G': { x: 30, y: 75 }
            };

            // 2. Adjacency list for DIRECTED edges
            const adjList = {
                'A': ['B', 'C', 'G'],
                'B': ['E', 'D'],
                'C': ['D'],
                'D': ['E', 'F'],
                'E': [],
                'F': ['G'],
                'G': ['C']
            };

            // --- State ---
            let nodeElements = {}; // Stores { id: { group, circle, text } }
            let edgeElements = [];
            let steps = []; // Stores the sequence of algorithm steps
            let currentStep = 0;
            
            // Get all node IDs for setting initial states
            const allNodeIds = Object.keys(graphNodes);
            const initialNodeStates = allNodeIds.reduce((acc, id) => {
                acc[id] = 'default';
                return acc;
            }, {});
            
            // --- Utility Functions ---
            const getResponsiveCoords = (x, y) => {
                const bounds = svg.getBoundingClientRect();
                return {
                    cx: (x / 100) * bounds.width,
                    cy: (y / 100) * bounds.height
                };
            };

            /**
             * Calculates the end point of an edge line, offset from the center
             * of the target node to avoid overlapping with the arrowhead.
             */
            function calculateEdgeEndpoint(x1, y1, x2, y2, offset) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist === 0) return { x: x2, y: y2 };

                const ratio = (dist - offset) / dist;
                const newX = x1 + dx * ratio;
                const newY = y1 + dy * ratio;
                return { x: newX, y: newY };
            }
            
            // --- Drawing Functions ---
            
            function drawGraph() {
                // Clear all but the <defs>
                const defs = svg.querySelector('defs');
                svg.innerHTML = '';
                if (defs) svg.appendChild(defs);

                nodeElements = {};
                edgeElements = [];

                const bounds = svg.getBoundingClientRect();
                if (bounds.width === 0 || bounds.height === 0) {
                    requestAnimationFrame(drawGraph);
                    return;
                }

                const edgeGroup = document.createElementNS(svgNS, 'g');
                const nodeGroup = document.createElementNS(svgNS, 'g');
                svg.appendChild(edgeGroup);
                svg.appendChild(nodeGroup);

                // 1. Draw edges
                for (const u in adjList) {
                    const { cx: x1, cy: y1 } = getResponsiveCoords(graphNodes[u].x, graphNodes[u].y);
                    for (const v of adjList[u]) {
                        const { cx: x2, cy: y2 } = getResponsiveCoords(graphNodes[v].x, graphNodes[v].y);
                        
                        // Calculate offset endpoint for arrowhead
                        const { x: newX2, y: newY2 } = calculateEdgeEndpoint(x1, y1, x2, y2, arrowOffset);

                        const edge = document.createElementNS(svgNS, 'line');
                        edge.setAttribute('x1', x1);
                        edge.setAttribute('y1', y1);
                        edge.setAttribute('x2', newX2);
                        edge.setAttribute('y2', newY2);
                        edge.setAttribute('class', 'edge');
                        edge.setAttribute('id', `edge-${u}-${v}`);
                        edgeGroup.appendChild(edge);
                        edgeElements.push(edge);
                    }
                }

                // 2. Draw nodes
                for (const nodeId in graphNodes) {
                    const node = graphNodes[nodeId];
                    const { cx, cy } = getResponsiveCoords(node.x, node.y);

                    const nodeG = document.createElementNS(svgNS, 'g');
                    nodeG.setAttribute('class', 'node');
                    nodeG.setAttribute('id', `node-${nodeId}`);
                    nodeG.setAttribute('transform', `translate(${cx}, ${cy})`);

                    const circle = document.createElementNS(svgNS, 'circle');
                    circle.setAttribute('r', nodeRadius);
                    circle.setAttribute('class', 'node-circle');
                    
                    const text = document.createElementNS(svgNS, 'text');
                    text.setAttribute('class', 'node-text');
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('dy', '0.3em');
                    text.textContent = nodeId;

                    nodeG.appendChild(circle);
                    nodeG.appendChild(text);
                    nodeGroup.appendChild(nodeG);
                    
                    nodeElements[nodeId] = { group: nodeG, circle, text };
                }
            }

            function handleResize() {
                drawGraph();
                // Re-apply the current step's state after redrawing
                if (steps.length > 0) {
                    renderStep(currentStep, false); // false to avoid history push
                }
            }

            // --- UI Update Functions ---
            
            function setNodeState(id, state) { // state: 'inStack' | 'visited' | 'default'
                const el = nodeElements[id];
                if (!el) return;
                
                el.group.classList.remove('node-inStack', 'node-visited');
                if (state === 'inStack') {
                    el.group.classList.add('node-inStack');
                } else if (state === 'visited') {
                    el.group.classList.add('node-visited');
                }
            }
            
            /**
             * Updates the Stack UI based on an array of node IDs
             */
            function updateStackUI(stackIds) {
                if (stackIds.length === 0) {
                    stackContainer.innerHTML = ''; 
                    stackContainer.appendChild(stackPlaceholder); 
                } else {
                    if (stackPlaceholder.parentNode) {
                        stackPlaceholder.remove(); 
                    }
                    stackContainer.innerHTML = ''; 
                    // To show "top" of stack on the right, we don't reverse
                    stackIds.forEach(nodeId => {
                        const item = document.createElement('div');
                        item.className = 'stack-item';
                        item.textContent = nodeId;
                        stackContainer.appendChild(item);
                    });
                }
            }
            
            function updateVisitedUI(visitedOrder) {
                if (visitedOrder.length === 0) {
                    visitedOutput.textContent = '';
                    if (!visitedPlaceholder.parentNode) {
                        visitedContainer.prepend(visitedPlaceholder);
                    }
                } else {
                    if (visitedPlaceholder.parentNode) {
                        visitedPlaceholder.remove();
                    }
                    visitedOutput.textContent = visitedOrder.join(' → ');
                }
            }

            // --- Algorithm Step Generation (DFS Stack-based) ---

            /**
             * Generates all steps of the DFS algorithm and stores them in the 'steps' array.
             * This version implements the "recursive-style" or "path-tracking" DFS
             * as per your provided algorithm steps.
             */
            function generateDFSSteps() {
                steps = []; // Clear previous steps
                let stack = []; // This stack represents the current path
                let visitedOrder = [];
                let nodeStates = { ...initialNodeStates };
                let visitedSet = new Set(); // To track all visited/discovered nodes
                
                const startNodeId = 'A'; // Start at 'A'

                // Helper to find the first unvisited neighbor (using adjList order)
                function findUnvisitedNeighbor(nodeId) {
                    const neighbors = (adjList[nodeId] || []); // Removed .slice().sort()
                    for (const neighborId of neighbors) {
                        if (!visitedSet.has(neighborId)) {
                            return neighborId;
                        }
                    }
                    return null;
                }

                // Initial state (Step 0)
                steps.push({
                    nodeStates: { ...initialNodeStates },
                    stack: [],
                    visitedOrder: [],
                    message: `Algorithm ready. Start node is '${startNodeId}'. Click 'Next'.`
                });

                // Step 0: Initialize
                stack.push(startNodeId);
                visitedSet.add(startNodeId);
                nodeStates[startNodeId] = 'inStack';
                steps.push({
                    nodeStates: { ...nodeStates },
                    stack: [...stack],
                    visitedOrder: [...visitedOrder],
                    message: `Initialize: Push start node '${startNodeId}' onto stack.`
                });

                // Step 1: Visit vertex at top of stack
                let currentNodeId = stack[stack.length - 1]; // Peek
                nodeStates[currentNodeId] = 'visited';
                visitedOrder.push(currentNodeId);
                steps.push({
                    nodeStates: { ...nodeStates },
                    stack: [...stack],
                    visitedOrder: [...visitedOrder],
                    message: `Visit node '${currentNodeId}' at top of stack.`
                });

                // Main loop (Steps 2-6)
                while (stack.length > 0) {
                    currentNodeId = stack[stack.length - 1]; // Peek at the top

                    // Step 2 & 3: Add an adjacent unvisited vertex
                    const neighborId = findUnvisitedNeighbor(currentNodeId);
                    
                    if (neighborId) {
                        // Found one. Push it, mark it, and go back to Step 1 (visit)
                        stack.push(neighborId);
                        visitedSet.add(neighborId);
                        nodeStates[neighborId] = 'inStack'; // Mark as on-stack
                        steps.push({
                            nodeStates: { ...nodeStates },
                            stack: [...stack],
                            visitedOrder: [...visitedOrder],
                            message: `Found unvisited neighbor '${neighborId}' of '${currentNodeId}'. Push onto stack.`
                        });

                        // Step 1 (repeat): Visit new top of stack
                        let newTopNodeId = stack[stack.length - 1];
                        nodeStates[newTopNodeId] = 'visited'; // Mark as visited
                        visitedOrder.push(newTopNodeId);
                        steps.push({
                            nodeStates: { ...nodeStates },
                            stack: [...stack],
                            visitedOrder: [...visitedOrder],
                            message: `Visit node '${newTopNodeId}' at top of stack.`
                        });
                        // Loop continues (back to Step 2)
                    } else {
                        // Step 4: No adjacent unvisited vertices. Backtrack (pop).
                        const poppedNodeId = stack.pop();
                        // State remains 'visited'
                        
                        if (stack.length > 0) {
                            steps.push({
                                nodeStates: { ...nodeStates },
                                stack: [...stack],
                                visitedOrder: [...visitedOrder],
                                message: `Node '${poppedNodeId}' has no unvisited neighbors. Backtrack (pop).`
                            });
                        } else {
                            // This was the last node, stack is now empty
                            steps.push({
                                nodeStates: { ...nodeStates },
                                stack: [...stack],
                                visitedOrder: [...visitedOrder],
                                message: `Node '${poppedNodeId}' has no unvisited neighbors. Stack is now empty.`
                            });
                        }
                        // Loop continues (Step 5/6 implied). 
                        // If stack not empty, next loop iteration re-checks top node.
                        // If stack empty, loop terminates.
                    }
                }

                // Step 6: Finished
                steps.push({
                    nodeStates: { ...nodeStates },
                    stack: [],
                    visitedOrder: [...visitedOrder],
                    message: "Traversal complete. Stack is empty."
                });
            }

            // --- Step Rendering and Navigation ---

            /**
             * Renders a specific step from the 'steps' array.
             * @param {number} index The index of the step to render.
             */
            function renderStep(index) {
                if (index < 0 || index >= steps.length) return;

                currentStep = index;
                const step = steps[currentStep];

                // Update node visuals
                Object.keys(step.nodeStates).forEach(nodeId => {
                    setNodeState(nodeId, step.nodeStates[nodeId]);
                });

                // Update UI panels
                updateStackUI(step.stack);
                updateVisitedUI(step.visitedOrder);
                stepDescription.textContent = step.message;

                // Update button states
                prevBtn.disabled = (currentStep === 0);
                nextBtn.disabled = (currentStep === steps.length - 1);
                resetBtn.disabled = (currentStep === 0);
            }

            function handleNext() {
                if (currentStep < steps.length - 1) {
                    renderStep(currentStep + 1);
                }
            }

            function handlePrev() {
                if (currentStep > 0) {
                    renderStep(currentStep - 1);
                }
            }
            
            function resetVisualization() {
                renderStep(0);
            }

            // --- Event Listeners ---
            prevBtn.addEventListener('click', handlePrev);
            nextBtn.addEventListener('click', handleNext);
            resetBtn.addEventListener('click', resetVisualization);
            window.addEventListener('resize', handleResize);
            
            // --- Initial Setup ---
            drawGraph();
            generateDFSSteps();
            renderStep(0); // Render the initial state

        });
    </script>

</body>
</html>
